<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #d0cec9; font-family: Arial, sans-serif; font-size: 13px; color: #111; padding: 20px; }
  .frame { background: #d9d7d2; border: 1px solid #aaa; padding: 20px; width: 1000px; }
  h1 { font-size: 20px; font-weight: bold; margin-bottom: 14px; }
  .section-box { border: 1px solid #888; padding: 12px; margin-bottom: 12px; background: #d9d7d2; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  label { min-width: 90px; font-size: 13px; }
  .field { background: white; border: 1px solid #888; height: 20px; width: 160px; }
  .field.sm { width: 90px; }
  .field.md { width: 130px; }
  .stats { display: flex; gap: 16px; margin-bottom: 14px; }
  .stat { border: 1px solid #888; background: #e0ded9; padding: 10px 16px; min-width: 160px; }
  .stat-label { font-size: 11px; color: #555; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: bold; }
  .btn-row { display: flex; gap: 8px; margin: 10px 0; }
  button { background: #d9d7d2; border: 1px solid #555; padding: 4px 12px; font-size: 12px; cursor: default; }
  .search-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  th { text-align: left; padding: 3px 6px; font-weight: normal; border-bottom: 1px solid #888; }
  td { padding: 3px 6px; }
</style>
</head>
<body>
<div class="frame">
  <h1>Reportes y Estadísticas</h1>
  <div class="stats">
    <div class="stat"><div class="stat-label">Total reservas</div><div class="stat-val">—</div></div>
    <div class="stat"><div class="stat-label">Ingresos S/.</div><div class="stat-val">—</div></div>
    <div class="stat"><div class="stat-label">Clientes activos</div><div class="stat-val">—</div></div>
    <div class="stat"><div class="stat-label">Canchas en uso</div><div class="stat-val">—</div></div>
  </div>
  <div class="section-box">
    <div class="row">
      <label>Desde:</label><div class="field sm"></div>
      <label>Hasta:</label><div class="field sm"></div>
      <label>Tipo reporte:</label><div class="field md"></div>
    </div>
  </div>
  <div class="btn-row">
    <button>Generar Reporte</button>
    <button>Reservas por Cancha</button>
    <button>Ingresos por Fecha</button>
    <button>Exportar PDF</button>
    <button>Exportar Excel</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Cancha</th><th>Tipo</th><th>Total Reservas</th><th>Ingresos S/.</th><th>Promedio S/.</th><th>Estado</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
